<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <style>
      body {
        background: #1a1a1a;
        margin: 0;
        padding: 0;
      }
      #main-ui {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }
      #main-ui.hidden {
        display: none;
      }
      .create-join-container {
        display: flex;
        flex-direction: column;
        gap: 15px;
        width: 100%;
        max-width: 400px;
        padding: 30px;
        border-radius: 10px;
        background-color: #212121;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        backdrop-filter: blur(10px);
      }
      .form {
        display: none;
        flex-direction: column;
        gap: 15px;
      }
      .form.active {
        display: flex;
      }
      .tab {
        display: flex;
        gap: 10px;
        place-self: center;
        margin-bottom: 20px;
        background-color: #333333;
        padding: 5px;
        border-radius: 50px;
      }
      .tab button {
        flex: 1;
        padding: 8px;
        width: 100px;
        border: none;
        border-radius: 50px;
        background-color: #333333;
        color: white;
        cursor: pointer;
      }
      .tab button.active {
        background-color: #007bff;
      }
      .primary-input {
        padding: 10px;
        width: 100%;
        border: none;
        border-radius: 10px;
        background-color: #333333;
        color: white;
        height: 40px;
        box-sizing: border-box;
        border: 1px solid #737373;
      }
      .primary-button {
        height: 40px;
        padding: 10px 20px;
        border: none;
        border-radius: 10px;
        background-color: #007bff;
        color: white;
        cursor: pointer;
        margin-top: 20px;
      }
      .secondary-button {
        height: 40px;
        padding: 10px 20px;
        border: none;
        border-radius: 10px;
        background-color: transparent;
        color: white;
        border: 1px solid #737373;
        cursor: pointer;
      }
      .modal {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .modal-content {
        background-color: #212121;
        padding: 20px;
        border-radius: 10px;
        color: white;
        max-width: 400px;
        width: 100%;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      }
      #info-box {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        height: 100vh;
        transition: all 0.3s ease;
        opacity: 0;
        transform: translateY(20px);
        color: white;
      }
      #info-box.active {
        opacity: 1;
        transform: translateY(0);
      }
      .copy-link {
        margin-top: 20px;
        padding: 5px 20px;
        border: none;
        border-radius: 25px;
        border: 1px solid #737373;
        color: white;
        background-color: transparent;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="main-ui">
      <div class="create-join-container">
        <div class="tab" id="tab">
          <button class="active">Create</button>
          <button>Join</button>
        </div>

        <div class="form active" id="create-form">
          <input
            id="create-url-input"
            type="text"
            class="primary-input"
            placeholder="Enter URL"
          />
          <!-- <input
            id="create-name-input"
            type="text"
            class="primary-input"
            placeholder="Enter room name"
          />
          <input
            id="create-password-input"
            type="password"
            class="primary-input"
            placeholder="Enter password"
          /> -->
          <button onclick="fetchVideoUrl()" class="primary-button">
            Create Room
          </button>
        </div>

        <div class="form" id="join-form">
          <input
            id="join-id-input"
            type="text"
            class="primary-input"
            placeholder="Enter room ID"
          />
          <input
            id="join-password-input"
            type="password"
            class="primary-input"
            placeholder="Enter password"
          />
          <button onclick="joinRoom()" class="primary-button">Join Room</button>
        </div>
      </div>

      <div id="modal"></div>
    </div>

    <div id="info-box">
      <h1>Welcome to the Room Creation Page!</h1>
      <div id="random-details"></div>
      <button class="copy-link" onclick="copyRoomLink()">Copy Link</button>
    </div>

    <script>
      const tabButtons = document.querySelectorAll(".tab button");
      const forms = document.querySelectorAll(".form");

      tabButtons.forEach((button, index) => {
        button.addEventListener("click", () => {
          tabButtons.forEach((btn) => btn.classList.remove("active"));
          forms.forEach((form) => form.classList.remove("active"));

          button.classList.add("active");
          forms[index].classList.add("active");
        });
      });

      // Helpers
      function showToast(d) {
        const msg =
          typeof d === "string" ? d : d?.message || "An error occurred";

        const toast = document.createElement("div");
        toast.textContent = msg;
        toast.style.position = "fixed";
        toast.style.bottom = "20px";
        toast.style.left = "50%";
        toast.style.transform = "translateX(-50%)";
        toast.style.backgroundColor = "#333333";
        toast.style.color = "white";
        toast.style.padding = "10px 20px";
        toast.style.borderRadius = "10px";
        toast.style.opacity = "0";
        toast.style.transition = "opacity 0.3s ease";

        document.body.appendChild(toast);

        setTimeout(() => {
          toast.style.opacity = "1";
          setTimeout(() => {
            toast.style.opacity = "0";
            setTimeout(() => {
              document.body.removeChild(toast);
            }, 300);
          }, 2000);
        }, 100);
      }
    </script>

    <script>
      const apiEndpoint = "http://localhost:3000";
      const socket = io(apiEndpoint);

      const getRandomString = (length) => {
        const chars =
          "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
        let result = "";
        for (let i = 0; i < length; i++) {
          result += chars[Math.floor(Math.random() * chars.length)];
        }
        return result;
      };

      let currentRoomId = null;
      let currentRoomName = null;
      let currentRoomPassword = null;
      let currentVideoUrl = null;

      function showRoomUI(id, name) {
        const infoBox = document.getElementById("info-box");
        const mainUi = document.getElementById("main-ui");

        infoBox.classList.add("active");
        mainUi.classList.add("hidden");

        let text = `Room "${name}", id: ${id}`;

        document.getElementById("random-details").textContent = text;
      }

      // Copy Room Link
      function copyRoomLink() {
        const roomLink = `${window.location.origin}/?room_id=${currentRoomId}&room_name=${encodeURIComponent(currentRoomName)}`;

        navigator.clipboard.writeText(roomLink).then(() => {
          showToast("Room link copied to clipboard!");
        });
      }

      /// Core Functions
      async function fetchVideoUrl() {
        try {
          currentVideoUrl = document
            .getElementById("create-url-input")
            .value.trim();

          if (!currentVideoUrl) {
            showToast("Please enter a video or website URL");
            return;
          }
          const response = await fetch(
            `${apiEndpoint}/extract-video-url?url=${encodeURIComponent(currentVideoUrl)}`,
            { method: "GET" },
          );
          const data = await response.json();
          console.log("data", data);
        } catch (error) {
          console.log("error", error);
          showToast(error);
        }
      }

      // Create Room
      function createRoom() {
        try {
          currentRoomId = getRandomString(15);

          // send to backend
          socket.emit("create-room", {
            roomId: currentRoomId,
            roomName: currentRoomName,
            password: currentRoomPassword,
          });

          showRoomUI(currentRoomId, currentRoomName);
        } catch (error) {
          showToast(error);
        }
      }

      // JOIN ROOM
      function joinRoom() {
        const roomId = document.getElementById("join-id-input").value.trim();
        const roomPassword = document
          .getElementById("join-password-input")
          .value.trim();

        if (!roomId) {
          showToast("Please enter a room ID");
          return;
        }

        socket.emit("join-room", { roomId: roomId, password: roomPassword });
      }

      // RECEIVE ROOM DATA
      socket.on("room-data", (data) => {
        const { roomId, roomName } = data;

        currentRoomId = roomId;
        currentRoomName = roomName;

        showRoomUI(roomId, roomName);
      });

      // ERROR HANDLING
      socket.on("error-message", showToast);

      // LOAD FROM URL
      function loadRoomFromURL() {
        try {
          const params = new URLSearchParams(window.location.search);
          const roomId = params.get("room_id");
          const roomName = params.get("room_name");

          if (roomId) {
            const createForm = document.getElementById("create-form");
            const joinForm = document.getElementById("join-form");

            const roomIdInput = document.getElementById("join-id-input");
            const tabButtons = document.querySelectorAll(".tab button");

            createForm.classList.remove("active");
            joinForm.classList.add("active");
            roomIdInput.value = roomId;
            tabButtons.forEach((btn) => btn.classList.remove("active"));
            tabButtons[1]?.classList?.add("active");
          }
        } catch (error) {}
      }

      window.onload = loadRoomFromURL;
    </script>
  </body>
</html>
